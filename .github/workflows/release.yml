name: Release

concurrency:
  group: release-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: Version to release (for example 0.4.5)
        required: true
        type: string
      source_ref:
        description: Git ref to build from
        required: false
        type: string
      prerelease:
        description: Mark this release as a prerelease
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_VERSION: 1.94.0

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.release_ref.outputs.tag }}
      source_ref: ${{ steps.release_ref.outputs.source_ref }}
      prerelease: ${{ steps.prerelease.outputs.prerelease }}
    steps:
      - name: Determine source ref
        id: source_ref
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.source_ref }}" ]]; then
            echo "source_ref=${{ github.event.inputs.source_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "source_ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ steps.source_ref.outputs.source_ref }}

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Validate version format
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "Invalid version format: ${VERSION}"
            exit 1
          fi

      - name: Validate manifest version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CURRENT_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          if [[ "${CURRENT_VERSION}" != "${VERSION}" ]]; then
            echo "Cargo.toml version ${CURRENT_VERSION} does not match release version ${VERSION}"
            exit 1
          fi

      - name: Determine prerelease flag
        id: prerelease
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "prerelease=${{ github.event.inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          elif [[ "${VERSION}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure release tag
        id: release_ref
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          SOURCE_REF="${{ steps.source_ref.outputs.source_ref }}"
          TARGET_SHA="$(git rev-parse "${SOURCE_REF}^{commit}")"

          if git rev-parse -q --verify "refs/tags/${TAG}^{commit}" >/dev/null; then
            EXISTING_SHA="$(git rev-parse "${TAG}^{commit}")"
            if [[ "${EXISTING_SHA}" != "${TARGET_SHA}" ]]; then
              echo "Existing tag ${TAG} points to ${EXISTING_SHA}, expected ${TARGET_SHA}"
              exit 1
            fi
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            git tag -a "${TAG}" "${TARGET_SHA}" -m "Release ${TAG}"
            git push origin "refs/tags/${TAG}"
          else
            echo "Missing expected release tag ${TAG}"
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "source_ref=refs/tags/${TAG}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.artifact }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            artifact: linux
          - runner: macos-latest
            artifact: macos
          - runner: windows-latest
            artifact: windows
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.source_ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl@3 pkg-config
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"

      - name: Build vt-cli
        run: cargo build --locked --release --features cli --bin vt-cli --verbose

      - name: Build mcp_server
        run: cargo build --locked --release --features mcp --bin mcp_server --verbose

      - name: Package release artifacts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp LICENSE README.md dist/
          cp target/release/vt-cli dist/
          cp target/release/mcp_server dist/
          tar czf "virustotal-rs-${{ needs.prepare.outputs.version }}-${{ matrix.artifact }}.tar.gz" -C dist .

      - name: Package release artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item LICENSE dist/
          Copy-Item README.md dist/
          Copy-Item target/release/vt-cli.exe dist/
          Copy-Item target/release/mcp_server.exe dist/
          Compress-Archive -Path dist/* -DestinationPath "virustotal-rs-${{ needs.prepare.outputs.version }}-${{ matrix.artifact }}.zip" -Force

      - name: Upload release artifacts (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-${{ matrix.artifact }}
          path: "*.tar.gz"
          retention-days: 7

      - name: Upload release artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-${{ matrix.artifact }}
          path: "*.zip"
          retention-days: 7

  publish-crate:
    name: Publish to crates.io
    needs: [prepare, build]
    if: secrets.CARGO_REGISTRY_TOKEN != '' || secrets.CRATES_IO_TOKEN != ''
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN || secrets.CRATES_IO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.source_ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Publish crate
        run: cargo publish --locked --token "${CARGO_REGISTRY_TOKEN}"

  upload-assets:
    name: Publish GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.source_ref }}

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true
          path: dist
          pattern: release-*

      - name: Generate release notes
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="${{ needs.prepare.outputs.tag }}"

          if [[ -f CHANGELOG.md ]]; then
            awk "/^## \\[${VERSION}\\]/{flag=1;next}/^## \\[/{flag=0}flag" CHANGELOG.md > release_notes.md
          fi

          if [[ ! -s release_notes.md ]]; then
            PREVIOUS_TAG="$(git tag --sort=-version:refname | grep -vx "${TAG}" | head -n 1 || true)"
            {
              echo "## Release ${TAG}"
              echo
              if [[ -n "${PREVIOUS_TAG}" ]]; then
                git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges
              else
                git log --pretty=format:"- %s (%h)" --no-merges
              fi
            } > release_notes.md
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          body_path: release_notes.md
          draft: false
          files: dist/**
          name: VirusTotal Rust SDK ${{ needs.prepare.outputs.tag }}
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          tag_name: ${{ needs.prepare.outputs.tag }}
