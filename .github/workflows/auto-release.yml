name: Auto Release

concurrency:
  group: auto-release-${{ github.event.workflow_run.head_branch || github.ref_name || 'main' }}
  cancel-in-progress: true

on:
  workflow_run:
    workflows: ["CI", "Security"]
    types: [completed]
    branches: [main]
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      version_bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  actions: read
  contents: write

env:
  RUST_VERSION: 1.94.0

jobs:
  check:
    name: Check for Release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event.workflow_run.conclusion == 'success'
    outputs:
      current_version: ${{ steps.version.outputs.current_version }}
      next_version: ${{ steps.version.outputs.next_version }}
      should_release: ${{ steps.check.outputs.should_release }}
      target_sha: ${{ steps.target.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref_name }}

      - name: Determine target SHA
        id: target
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Check CI and security status
        id: ci_status
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.event_name }}" == "schedule" ]]; then
            echo "all_passed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TARGET_SHA="${{ steps.target.outputs.sha }}"
          CI_STATUS="$(gh run list --workflow=ci.yml --branch=main --commit="${TARGET_SHA}" --event=push --limit=1 --json conclusion --jq '.[0].conclusion // ""')"
          SECURITY_STATUS="$(gh run list --workflow=security.yml --branch=main --commit="${TARGET_SHA}" --event=push --limit=1 --json conclusion --jq '.[0].conclusion // ""')"

          if [[ "${CI_STATUS}" == "success" && "${SECURITY_STATUS}" == "success" ]]; then
            echo "all_passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "all_passed=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide whether to release
        id: check
        run: |
          LAST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          if [[ -z "${LAST_TAG}" ]]; then
            LAST_TAG="$(git rev-list --max-parents=0 HEAD)"
          fi

          CHANGES="$(git log "${LAST_TAG}"..HEAD --oneline --no-merges | wc -l)"
          FEAT_COUNT="$(git log "${LAST_TAG}"..HEAD --grep='^feat' --oneline --no-merges | wc -l)"
          FIX_COUNT="$(git log "${LAST_TAG}"..HEAD --grep='^fix' --oneline --no-merges | wc -l)"
          BREAKING_BODY_COUNT="$(git log "${LAST_TAG}"..HEAD --grep='BREAKING CHANGE' --oneline --no-merges | wc -l)"
          BREAKING_SUBJECT_COUNT="$(git log "${LAST_TAG}"..HEAD --pretty=format:%s --no-merges | grep -Ec '^[[:alpha:]][[:alnum:]-]*(\([^)]+\))?!:' || true)"
          BREAKING_COUNT="$((BREAKING_BODY_COUNT + BREAKING_SUBJECT_COUNT))"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ steps.ci_status.outputs.all_passed }}" != "true" ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          elif [[ "${CHANGES}" -eq 0 ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          elif [[ "${BREAKING_COUNT}" -gt 0 || "${FEAT_COUNT}" -gt 0 || "${FIX_COUNT}" -gt 0 ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine version
        id: version
        if: steps.check.outputs.should_release == 'true'
        run: |
          CURRENT_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
          IFS='.' read -r MAJOR MINOR PATCH <<< "${CURRENT_VERSION}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BUMP_TYPE="${{ github.event.inputs.version_bump }}"
          else
            LAST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
            if [[ -z "${LAST_TAG}" ]]; then
              LAST_TAG="$(git rev-list --max-parents=0 HEAD)"
            fi

            BREAKING_BODY="$(git log "${LAST_TAG}"..HEAD --grep='BREAKING CHANGE' --oneline --no-merges | wc -l)"
            BREAKING_SUBJECT="$(git log "${LAST_TAG}"..HEAD --pretty=format:%s --no-merges | grep -Ec '^[[:alpha:]][[:alnum:]-]*(\([^)]+\))?!:' || true)"
            BREAKING="$((BREAKING_BODY + BREAKING_SUBJECT))"
            FEAT="$(git log "${LAST_TAG}"..HEAD --grep='^feat' --oneline --no-merges | wc -l)"

            if [[ "${BREAKING}" -gt 0 ]]; then
              BUMP_TYPE="major"
            elif [[ "${FEAT}" -gt 0 ]]; then
              BUMP_TYPE="minor"
            else
              BUMP_TYPE="patch"
            fi
          fi

          case "${BUMP_TYPE}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
            *) echo "Unknown bump type: ${BUMP_TYPE}"; exit 1 ;;
          esac

          echo "next_version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

  release:
    name: Bump Version and Tag
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ needs.check.outputs.target_sha }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install cargo-edit
        uses: taiki-e/install-action@e9e8e031bcd90cdbe8ac6bb1d376f8596e587fbf # v2.70.2
        with:
          tool: cargo-edit@0.13.9

      - name: Update version
        run: |
          VERSION="${{ needs.check.outputs.next_version }}"
          cargo set-version "${VERSION}"
          cargo check --all-features >/dev/null

      - name: Commit and tag
        run: |
          set -euo pipefail
          VERSION="${{ needs.check.outputs.next_version }}"
          TARGET_SHA="${{ needs.check.outputs.target_sha }}"

          git fetch origin main --no-tags
          CURRENT_MAIN_SHA="$(git rev-parse origin/main)"
          if [[ "${CURRENT_MAIN_SHA}" != "${TARGET_SHA}" ]]; then
            echo "main advanced to ${CURRENT_MAIN_SHA}; skipping stale auto-release run for ${TARGET_SHA}"
            exit 0
          fi

          git add Cargo.toml Cargo.lock
          if git diff --cached --quiet; then
            echo "No version changes to commit"
            exit 0
          fi

          git commit -m "chore: release v${VERSION}"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin HEAD:main
          git push origin "v${VERSION}"
